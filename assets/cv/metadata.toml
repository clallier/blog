#:schema https://raw.githubusercontent.com/yunanwg/brilliant-CV/main/metadata.toml.schema.json

# Must match folder suffix: "en" → modules_en/, "fr" → modules_fr/, etc.
language = "en"

[layout]
    awesome_color = "#303f4eff"
    before_section_skip = "0pt"
    before_entry_skip = "0pt"
    before_entry_description_skip = "0pt"
    paper_size = "a4"
    font_size = "9.5pt"
    margin = "1.25cm"

    [layout.fonts]
        regular_fonts = ["Roboto"]
        header_font = "Roboto"

    [layout.header]
        header_align = "left"
        display_profile_photo = true
        profile_photo_radius = "50%"
        info_font_size = "9pt"

    [layout.entry]
        display_entry_society_first = true
        display_logo = true

    [layout.footer]
        display_page_counter = true
        display_footer = true

[inject]
