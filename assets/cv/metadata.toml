    injected_keywords_list = ["Langchain", "LangGraph", "LiteLLM", "AWS Bedrock", "AWS Sagemaker", "Anthropic", "OpenAI", "Google Vertex AI", "Mistral", "AWS Infrastructure", "Python", "SQL", "Azure", "Apache Kafka", "Spark", "Kubernetes", "Computer Vision", "No-code", "NLP", "Machine Learning", "Data Science", "Agentic Systems", "AI Agents", "Autonomous Agents", "Multi-Agent Systems", "AI", "MLE", "Machine Learning Engineer", "Deep Learning", "LLM", "Generative AI", "GenAI", "RAG", "Retrieval Augmented Generation", "PyTorch", "Data Engineering", "LLMOps", "Graph Neural Networks", "GNN", "Attentional Neural Networks", "LLM Optimization", "LLM Evaluation", "LLM Monitoring", "Large Language Models", "Vector Databases", "Pinecone", "Milvus", "ChromaDB", "Weaviate", "Qdrant", "FAISS", "Semantic Search", "Embedding Models", "Fine-tuning", "PEFT", "LoRA", "QLoRA", "RLHF", "DPO", "Prompt Engineering", "Orchestration", "Chain of Thought", "HuggingFace", "Transformers", "GPT", "Claude", "Llama", "Meta", "Model Deployment", "Big Data", "Data Pipeline", "ETL", "ELT", "Data Warehouse", "Data Lake", "Databricks", "Snowflake", "Stream Processing", "Batch Processing", "Real-time Data", "Microservices", "Distributed Systems", "Cloud Computing", "AWS", "Amazon Web Services", "GCP", "Google Cloud Platform", "Docker", "Docker Swarm", "Containers", "Serverless", "CI/CD", "Terraform", "Infrastructure as Code", "IaC", "Jenkins", "MLOps", "Observability", "LLM Observability", "Software Architect", "Technical Lead", "Lead Data Scientist", "Engineering Manager", "AI Strategy", "Digital Transformation", "Mentorship", "Technical Mentorship", "Agile", "Scrum", "Product Management", "Cybersecurity", "IoT", "Internet of Things", "Industrial AI", "Predictive Modeling", "Optimization", "Heuristics", "Graph Theory", "Bayesian Statistics", "Markov Networks", "Differential Equations", "C++", "C#", "Java", "Scala", "React", "TypeScript", "JavaScript", "Haxe", "Unity3D", "REST API", "PostgreSQL", "Fren