<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 8 5 L 0 8 z" fill="currentColor" />
    </marker>
  </defs>

  <!-- Base Layer: Always Visible -->
  <g id="base_metrics">
    <!-- MRR -->
    <rect x="20" y="20" width="200" height="60" rx="8" ry="8" fill="none" stroke="currentColor" stroke-width="2" />
    <text x="35" y="45" font-family="'Avenir Next', sans-serif" font-size="14px" font-weight="bold" fill="currentColor">MRR = 0.85</text>

    <!-- avgF1 -->
    <rect x="20" y="100" width="200" height="60" rx="8" ry="8" fill="none" stroke="currentColor" stroke-width="2" />
    <text x="35" y="125" font-family="'Avenir Next', sans-serif" font-size="14px" font-weight="bold" fill="currentColor">avgF1 = 0.80</text>

    <!-- avgNDCG -->
    <rect x="20" y="180" width="200" height="60" rx="8" ry="8" fill="none" stroke="currentColor" stroke-width="2" />
    <text x="35" y="205" font-family="'Avenir Next', sans-serif" font-size="14px" font-weight="bold" fill="currentColor">avgNDCG = 0.75</text>

    <!-- avgSize -->
    <rect x="20" y="260" width="200" height="60" rx="8" ry="8" fill="none" stroke="currentColor" stroke-width="2" />
    <text x="35" y="285" font-family="'Avenir Next', sans-serif" font-size="14px" font-weight="bold" fill="currentColor">avgSizeAccuracy = 0.90</text>

    <!-- minRR -->
    <rect x="20" y="340" width="200" height="60" rx="8" ry="8" fill="none" stroke="currentColor" stroke-width="2" />
    <text x="35" y="365" font-family="'Avenir Next', sans-serif" font-size="14px" font-weight="bold" fill="currentColor">minRR = 0.70</text>
  </g>

  <!-- Step 1: Show Weights & Products -->
  <g id="weights_step_1" inkscape:label="weights__step_1">
    <!-- Straight Connectors -->
    <path d="M 220 50 L 260 50" fill="none" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow)" />
    <path d="M 220 130 L 260 130" fill="none" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow)" />
    <path d="M 220 210 L 260 210" fill="none" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow)" />
    <path d="M 220 290 L 260 290" fill="none" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow)" />
    <path d="M 220 370 L 260 370" fill="none" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- W1 -->
    <rect x="270" y="20" width="230" height="60" rx="8" ry="8" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.8" />
    <text x="285" y="45" font-family="'Avenir Next', sans-serif" font-size="13px" fill="currentColor">x 20% = 0.17</text>

    <!-- W2 -->
    <rect x="270" y="100" width="230" height="60" rx="8" ry="8" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.8" />
    <text x="285" y="125" font-family="'Avenir Next', sans-serif" font-size="13px" fill="currentColor">x 20% = 0.16</text>

    <!-- W3 -->
    <rect x="270" y="180" width="230" height="60" rx="8" ry="8" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.8" />
    <text x="285" y="205" font-family="'Avenir Next', sans-serif" font-size="13px" fill="currentColor">x 30% = 0.225</text>

    <!-- W4 -->
    <rect x="270" y="260" width="230" height="60" rx="8" ry="8" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.8" />
    <text x="285" y="285" font-family="'Avenir Next', sans-serif" font-size="13px" fill="currentColor">x 10% = 0.09</text>

    <!-- W5 -->
    <rect x="270" y="340" width="230" height="60" rx="8" ry="8" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.8" />
    <text x="285" y="365" font-family="'Avenir Next', sans-serif" font-size="13px" fill="currentColor">x 20% = 0.14</text>
  </g>

  <!-- Step 2: Highlight NDCG Weight -->
  <g id="ndcg_highlight_step_2" inkscape:label="ndcg_highlight__step_2">
    <!-- Green Border & Fill for NDCG Metric and Product -->
    <rect x="20" y="180" width="200" height="60" rx="8" ry="8" fill="none" stroke="#4caf50" stroke-width="3" />
    <rect x="270" y="180" width="230" height="60" rx="8" ry="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2.5" />
    <text x="285" y="205" font-family="'Avenir Next', sans-serif" font-size="13px" font-weight="bold" fill="#1b5e20">x 30% = 0.225 (NDCG)</text>
  </g>

  <!-- Step 3: Show Final Sum Card -->
  <g id="sum_step_3" inkscape:label="sum__step_3">
    <!-- Converging connectors from Products to Sum -->
    <path d="M 500 50 C 520 50, 520 210, 540 210" fill="none" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow)" />
    <path d="M 500 130 C 520 130, 520 210, 540 210" fill="none" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow)" />
    <path d="M 500 210 L 540 210" fill="none" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow)" />
    <path d="M 500 290 C 520 290, 520 210, 540 210" fill="none" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow)" />
    <path d="M 500 370 C 520 370, 520 210, 540 210" fill="none" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- Sum Card (Blue Highlight) -->
    <rect x="550" y="160" width="230" height="100" rx="12" ry="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="3" />
    <text x="665" y="200" font-family="'Avenir Next', sans-serif" font-size="15px" font-weight="bold" fill="#1976d2" text-anchor="middle">Weighted Average</text>
    <text x="665" y="235" font-family="'Avenir Next', sans-serif" font-size="28px" font-weight="bold" fill="#0d47a1" text-anchor="middle">0.785</text>
  </g>
</svg>
