<footer class="site-footer h-card">
  <data class="u-url" value="{{ '/' | relative_url }}"></data>

  <div class="wrapper">
    <div class="footer-col-wrapper">
      <div class="footer-col">
        <p class="footer-description">
          {{ site.description | escape }}
          <a href="{{ site.feed.path | default: 'feed.xml' | absolute_url }}" class="rss-icon-link" target="_blank">
            <svg class="svg-icon grey" viewbox="0 0 16 16"><path d="M12.8 16C12.8 8.978 7.022 3.2 0 3.2V0c8.777 0 16 7.223 16 16h-3.2zM2.194 11.61c1.21 0 2.195.985 2.195 2.196 0 1.21-.99 2.194-2.2 2.194C.98 16 0 15.017 0 13.806c0-1.21.983-2.195 2.194-2.195zM10.606 16h-3.11c0-4.113-3.383-7.497-7.496-7.497v-3.11c5.818 0 10.606 4.79 10.606 10.607z"/></svg>
          </a>
        </p>
      </div>
      <div class="footer-col">
        {%- if site.author %}
        <ul class="contact-list">
          {% if site.author.name -%}<li class="p-name">{{ site.author.name | escape }}</li>{% endif -%}
          {% if site.author.email -%}<li><a class="u-email" href="mailto:{{ site.author.email }}">{{ site.author.email }}</a></li>{%- endif %}
        </ul>
        {%- endif %}
      </div>
    </div>
  </div>
</footer>

<style>
  .footer-description {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0;
  }
  .rss-icon-link {
    display: inline-flex;
    align-items: center;
  }
  .rss-icon-link .svg-icon {
    width: 16px;
    height: 16px;
    fill: #828282;
    transition: fill 0.3s;
  }
  .rss-icon-link:hover .svg-icon {
    fill: var(--minima-brand-color);
  }
</style>
