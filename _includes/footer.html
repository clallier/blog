<footer class="site-footer h-card">
  <data class="u-url" value="{{ '/' | relative_url }}"></data>

  <div class="wrapper">
    <div class="footer-grid">
      <!-- Left Column: Description -->
      <div class="footer-description">
        <p>{{ site.description | replace: "🛸", '<a href="/404.html" class="footer-icon">🛸</a>' }}</p>
      </div>

      <!-- Right Column: Name & RSS -->
      <div class="footer-contact">
        <p class="p-name">{{ site.author.name | escape }}
          <a href="{{ '/feed.xml' | relative_url }}" class="footer-icon" title="Subscribe to RSS">📻</a>
        </p>
      </div>
    </div>
  </div>
</footer>
