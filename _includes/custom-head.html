<!-- Favicon -->
<link id="favicon" rel="icon" href="{{ '/assets/img/favicon.png' | relative_url }}" type="image/png">

<style>
    /* List of posts on front page */
    .post-list {
        margin-left: 0;
        list-style: none;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
    }

    @media (max-width: 800px) {
        .post-list {
            grid-template-columns: 1fr;
        }
    }

    @keyframes elastic-wobble {
        0% {
            transform: scale(0.98);
        }

        30% {
            transform: scale(1.03) rotate(0.5deg);
        }

        50% {
            transform: scale(0.98) rotate(-0.5deg);
        }

        70% {
            transform: scale(1.01) rotate(0.2deg);
        }

        100% {
            transform: scale(1) rotate(0);
        }
    }

    .post-item {
        background: var(--minima-card-bg) !important;
        backdrop-filter: blur(12px) !important;
        border: 1px solid var(--minima-card-border) !important;
        border-radius: 12px;
        overflow: hidden;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);

        &:hover {
            background: var(--minima-card-bg-hover) !important;
            animation: elastic-wobble 0.3s cubic-bezier(0.2, 0.88, 0.25, 1);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
            border-color: var(--minima-brand-color) !important;
        }
    }

    a.post-card {
        text-decoration: none;
        color: inherit;
    }

    .post-card {
        display: flex;
        flex-direction: column;
        padding: 1.5rem;
        height: 100%;
    }

    .post-card-content {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    @media (max-width: 500px) {
        .post-card-content {
            flex-direction: column;
            align-items: flex-start;
            gap: 15px;
        }
    }

    .post-img {
        width: 80px;
        height: 80px;
        border-radius: 8px;
        object-fit: contain;
        background: var(--minima-code-background-color);
        padding: 5px;
    }

    .post-text {
        flex: 1;
    }

    .post-meta {
        display: block;
        font-size: 0.75rem;
        color: #828282;
        margin-bottom: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .post-title {
        font-size: 1.25rem;
        font-weight: 700;
        line-height: 1.3;
        margin: 0;
        color: var(--minima-site-title-color) !important;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
        color: var(--minima-site-title-color) !important;
    }

    /* Centered images and captions  */
    .post-content img {
        display: block;
        margin-left: auto;
        margin-right: auto;
        max-width: 100%;
        max-height: 40vh;
        height: auto;
        margin-top: 2rem;
    }

    .post-content img+em {
        display: block;
        text-align: center;
        margin-top: 1rem;
        margin-bottom: 2rem;
    }

    /* Code blocks word wrap */
    mjx-math,
    code,
    pre.highlight {
        white-space: pre-wrap;
        word-wrap: break-word;
        overflow-wrap: break-word;
        font-size: 13px;
    }

    /* MathJax Colorbox Readability Fix */
    mjx-container [style*="background-color"] {
        color: var(--math-box-text) !important;
        padding: 2px 4px;
        border-radius: 4px;
    }

    /* Youtube wrapper */
    .youtube-wrapper {
        position: relative;
        width: 100%;
        height: 0;
        padding-bottom: 56.25%;
        margin-bottom: 1.5rem;
    }

    .youtube-wrapper iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
    }

    .post-content p {
        text-align: justify;
    }

    @media screen and (min-width: 600px) {
        .site-nav .nav-items {
            display: flex;
            gap: 20px;
            justify-content: flex-end;
            align-items: center;
        }

        .site-nav .nav-item {
            margin-left: 0 !important;
        }
    }

    /* Fix z-index for mobile menu dropdown */
    @media screen and (max-width: 600px) {
        .site-nav {
            z-index: 9999 !important;
            /* position: relative; */
        }
    }

    /* --- MINIMAL FLEX FOOTER --- */
    .footer-grid {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
        padding: 30px 0;
    }

    @media screen and (max-width: 600px) {
        .footer-grid {
            flex-direction: column;
            text-align: center;
        }
    }

    .footer-description p {
        margin: 0;
        opacity: 0.8;
    }

    .footer-contact p {
        margin: 0;
        /* display: inline-block; */
        font-weight: bold;
    }

    .footer-icon {
        text-decoration: none;
        transition: transform 0.08s ease;
        display: inline-block;
    }

    .footer-icon:hover {
        text-decoration: none;
        transform: scale(1.4) rotate(15deg) translate(5px, -5px);
    }
</style>

<script async src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?version=4.8.0&features=es6"></script>
<script>
    window.MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']],
        },
        svg: { fontCache: 'global' }
    };
</script>
<script async id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@4.0.0-beta.3/tex-mml-chtml.js"></script>

<script async src="{{ '/assets/js/main.js' | relative_url }}" type="module"></script>
