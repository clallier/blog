<script>
    // Prevent multiple dropdowns from staying open simultaneously on click/tap,
    // and auto-close dropdown when clicking outside.
    document.addEventListener('click', function (e) {
        const dropdowns = document.querySelectorAll('.nav-dropdown');
        const isToggle = e.target.classList.contains('dropdown-toggle');
        const currentDropdown = e.target.closest('.nav-dropdown');

        dropdowns.forEach(dropdown => {
            if (dropdown === currentDropdown && isToggle) {
                e.preventDefault();
                if (dropdown.hasAttribute('open')) {
                    dropdown.removeAttribute('open');
                } else {
                    dropdown.setAttribute('open', '');
                }
            } else if (!dropdown.contains(e.target)) {
                dropdown.removeAttribute('open');
            }
        });
    });
</script>
